# RegRadar — Local Development Services
# Run: docker-compose up -d

version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: regradar_postgres
    environment:
      POSTGRES_USER: regradar
      POSTGRES_PASSWORD: regradar_secret
      POSTGRES_DB: regradar
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U regradar"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: regradar_redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  redisdata:
